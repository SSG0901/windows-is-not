<h1>🎯 Emoji Catch!</h1>

<p>
Catch as many moving emojis as you can in 30 seconds!
</p>

<div class="info">

    <div class="card">
        Score
        <br>
        <span id="score">0</span>
    </div>

    <div class="card">
        Time
        <br>
        <span id="time">30</span> sec
    </div>

    <div class="card">
        Best Score
        <br>
        <span id="best">0</span>
    </div>

</div>

<div id="field">
    <div id="emoji">😎</div>
</div>

<button id="startButton">
    Start Game
</button>

<div id="message">
    Press the button to start!
</div>
